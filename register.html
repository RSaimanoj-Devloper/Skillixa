<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Skillixa</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="background-image"></div>

  <div class="toggle-container">
    <label class="switch">
      <input type="checkbox" id="modeToggle" />
      <span class="slider"></span>
    </label>
    <span class="mode-label">Dark Mode</span>
  </div>

  <div class="register-container">
    <div class="logo-bg">S</div>
    <h2>Create your Skillixa account</h2>
    <form>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your full name " required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Reenter your password" required minlength="6" />
      </div>

      <button type="submit" class="register-btn">Register</button>
    </form>

    <p class="footer-text">
      Already have an account?
      <a href="login.html">Sign in</a>
    </p>
  </div>

  <script>
    const toggle = document.getElementById('modeToggle');
    toggle.addEventListener('change', () => {
      document.documentElement.setAttribute('data-theme', toggle.checked ? 'dark' : 'light');
    });
  </script>
</body>
</html>
